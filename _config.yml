title: sueka.me
lang: ja
url: https://sueka.me
github_repo: sueka/sueka.me
license: CC0
license_url: https://creativecommons.org/publicdomain/zero/1.0/
katex_version: 0.9.0
incremental_dom_version: 0.5.1

author:
  name: Sueka
  email: suekaq@gmail.com
  pgp_key:
    id: D178285D
    url: https://sks-keyservers.net/pks/lookup?op=get&search=0x5B60E6C7D178285D
  twitter: hsueka
  github: sueka

defaults:
  - values:
      lang: ja
source: source/
lsi: true

collections:
  posts:
    permalink: /:year/:month/:title.html

liquid:
  error_mode: strict

markdown: kramdown

sass:
  style: compressed

plugins:
  - jekyll-archives
  - jekyll-coffeescript
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate-v2
  - jemoji

pagination:
  enabled: true
  per_page: 10
  sort_reverse: true
  permalink: /pages/:num/
  title: ':title'

autopages:
  enabled: true
  categories:
    enabled: false
  collections:
    enabled: false
  tags:
    layouts:
      - tag.tpl
    title: ':tag'
    permalink: /tags/:tag/
    # permalink: /tags/:tag.html

jekyll-archives:
  enabled:
    - year
    - month
  layouts:
    year: year-archives
    month: month-archives
  permalinks:
    year: /:year/
    month: /:year/:month/

katex:
  rendering_options:
    strict: true
