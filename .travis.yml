sudo: false

language: ruby
rvm:
  - 2.6.3
  # - 2.7.0-preview1

branches:
  only:
    - master
    - develop

install:
  - gem install bundler
  - bundle install --deployment
cache: bundler

script:
  - make source-check
  - make
  - make check

before_deploy:
  - openssl aes-256-cbc -K "$encrypted_ecea82995587_key" -iv "$encrypted_ecea82995587_iv" -in .travis/id_rsa.enc -out /tmp/id_rsa -d
  - eval "$(ssh-agent -s)"
  - chmod 600 /tmp/id_rsa
  - ssh-add /tmp/id_rsa
deploy:
  provider: script
  skip_cleanup: true
  script:
    find "$TRAVIS_BUILD_DIR/_site" -type f -exec chmod 604 {} \; &&
    find "$TRAVIS_BUILD_DIR/_site" -type d -exec chmod 701 {} \; &&
    rsync -qrpt --delete-after "$TRAVIS_BUILD_DIR/_site/" http@sueka.me:/opt/local/http/me/sueka/www/html
  on:
    rvm: 2.6.3
    branch: master

addons:
  apt:
    packages:
      - libgsl0-dev
  ssh_known_hosts:
    - sueka.me
    - 150.95.157.107

notifications:
  email:
    on_success: never
    on_failure: change
