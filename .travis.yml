language: ruby
rvm:
  - 2.6.3
  # - 2.7.0-preview1

install:
  - gem install bundler
  - bundle install --deployment
cache: bundler

script:
  - make source-check
  - TZ=Asia/Tokyo make
  - make check

before_deploy:
  - openssl aes-256-cbc -K "$encrypted_dc6ce25c5ee9_key" -iv "$encrypted_dc6ce25c5ee9_iv" -in .travis/id_rsa.enc -out /tmp/id_rsa -d
  - eval "$(ssh-agent -s)"
  - chmod 600 /tmp/id_rsa
  - ssh-add /tmp/id_rsa
deploy:
  provider: script
  script:
    find "$TRAVIS_BUILD_DIR/_site" -type f -exec chmod 604 {} \; &&
    find "$TRAVIS_BUILD_DIR/_site" -type d -exec chmod 701 {} \; &&
    rsync -qrpt --delete-after "$TRAVIS_BUILD_DIR/_site/" http@sueka.me:/opt/local/http/me/sueka/www/html
  on:
    rvm: 2.6.3
    branch: master

addons:
  apt:
    packages:
      - libgsl0-dev
  ssh_known_hosts:
    - sueka.me
    - 163.44.171.200

notifications:
  email:
    on_success: never
    on_failure: change
